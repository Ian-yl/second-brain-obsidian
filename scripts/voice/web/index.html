<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>第二大脑 · 语音通话采集</title>
<script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@1.34.0/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0F172A; --card:#172033; --card2:#1E293B; --line:#2A3650;
    --text:#F1F5F9; --muted:#94A3B8;
    --green:#22C55E; --green-d:#16A34A; --indigo:#6366F1; --red:#EF4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  [hidden]{display:none!important}
  html{height:100%}
  body{
    font-family:Inter,-apple-system,system-ui,"PingFang SC",sans-serif;
    background:var(--bg);color:var(--text);min-height:100%;
    -webkit-font-smoothing:antialiased;line-height:1.6;
    background-image:radial-gradient(circle at 50% 0%, rgba(99,102,241,.14), transparent 55%);
  }
  ::selection{background:var(--green);color:#062a12}

  .call{max-width:720px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:0 20px 20px}

  /* top bar */
  .bar{display:flex;align-items:center;justify-content:space-between;padding:20px 2px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.2px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
  .progress{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
  .bar-right{display:flex;align-items:center;gap:12px}
  .vsel{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .vsel button{font-family:inherit;font-size:12px;color:var(--muted);background:transparent;border:0;padding:5px 12px;cursor:pointer;transition:background .2s,color .2s}
  .vsel button.on{background:var(--green);color:#052e16;font-weight:600}
  .ended .orb-wrap{display:none}
  .progress:empty{display:none}

  /* stage */
  .stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;padding:16px 0 8px}

  .orb-wrap{display:flex;align-items:center;justify-content:center;width:200px;height:200px;margin-bottom:18px}
  .orb{
    width:128px;height:128px;border-radius:50%;position:relative;
    background:radial-gradient(circle at 36% 30%, #818cf8, #312e81);
    box-shadow:0 18px 60px -12px rgba(99,102,241,.65);
    transition:transform .25s ease, box-shadow .35s ease, background .35s ease;
  }
  .orb::before{content:"";position:absolute;inset:14px;border-radius:50%;background:radial-gradient(circle at 38% 32%, rgba(255,255,255,.45), transparent 60%)}
  .orb.speaking{animation:orbPulse 1.5s ease-in-out infinite;box-shadow:0 18px 80px -8px rgba(99,102,241,.85)}
  .orb.listening{
    background:radial-gradient(circle at 36% 30%, #4ade80, #047857);
    box-shadow:0 18px 70px -10px rgba(34,197,94,.7);
  }
  .orb.listening::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid var(--green);animation:sonar 1.7s ease-out infinite}
  @keyframes orbPulse{50%{transform:scale(1.07)}}
  @keyframes sonar{0%{transform:scale(1);opacity:.55}100%{transform:scale(1.75);opacity:0}}

  .question{font-size:clamp(20px,4.6vw,27px);font-weight:600;line-height:1.45;max-width:30ch;margin:0 auto;letter-spacing:-.2px}

  .live{margin:18px auto 0;max-width:440px;width:100%;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;text-align:left;white-space:pre-wrap;color:var(--text);font-size:15px;min-height:0}
  .live:empty{display:none}

  .status{margin-top:16px;font-size:13.5px;color:var(--muted);display:inline-flex;align-items:center;gap:8px;min-height:20px}
  .status:empty{display:none}
  .status::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 1.2s ease-in-out infinite;flex:none}
  @keyframes blink{50%{opacity:.25}}

  /* controls */
  .ctl{display:flex;justify-content:center;margin-top:24px}
  .btn{display:inline-flex;align-items:center;gap:10px;font-family:inherit;font-size:16px;font-weight:600;
    border:0;border-radius:999px;padding:15px 30px;cursor:pointer;transition:background .2s,transform .1s,opacity .2s;color:#fff}
  .btn:active{transform:translateY(1px)}
  .btn svg{width:19px;height:19px}
  .btn-call{background:var(--green);color:#052e16}
  .btn-call:hover{background:var(--green-d)}
  .btn:disabled{opacity:.55;cursor:default}
  .hangup{background:var(--red)}
  .hangup:hover{background:#dc2626}

  /* history */
  .history{display:flex;flex-direction:column;gap:14px;margin-top:8px}
  .history:empty{display:none}
  .turn{display:flex;flex-direction:column;max-width:88%;animation:rise .35s ease both}
  .turn .who{font-size:11px;color:var(--muted);margin:0 4px 4px;font-weight:500}
  .turn .bubble{padding:11px 15px;border-radius:16px;white-space:pre-wrap;font-size:15px;line-height:1.55}
  .turn.ai{align-self:flex-start}
  .turn.ai .bubble{background:var(--card2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .turn.user{align-self:flex-end;align-items:flex-end}
  .turn.user .who{text-align:right}
  .turn.user .bubble{background:rgba(34,197,94,.16);border:1px solid rgba(34,197,94,.35);border-bottom-right-radius:5px;color:#dcfce7}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* 通话中：面板钉住，历史局部滚（不挤页面，结束按钮常驻可见） */
  .calling .stage{flex:0 0 auto;justify-content:flex-start;padding:6px 0 0;gap:4px}
  .calling .orb-wrap{width:118px;height:118px;margin-bottom:6px}
  .calling .orb{width:76px;height:76px}
  .calling .question{font-size:clamp(17px,3.8vw,21px)}
  .calling .ctl{margin-top:12px}
  .calling .history{flex:1 1 auto;overflow-y:auto;min-height:0;margin-top:14px;padding:14px 2px 8px;border-top:1px solid var(--line);-webkit-overflow-scrolling:touch}

  a:focus-visible,button:focus-visible{outline:2px solid var(--green);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <main class="call">
    <header class="bar">
      <div class="brand"><span class="dot" aria-hidden="true"></span>第二大脑 · 语音采集</div>
      <div class="bar-right">
        <div class="vsel" id="vsel" role="group" aria-label="选择音色">
          <button type="button" data-v="male">男声</button>
          <button type="button" data-v="female" class="on">女声</button>
        </div>
        <div id="progress" class="progress"></div>
      </div>
    </header>

    <section class="stage">
      <div class="orb-wrap"><div id="orb" class="orb" aria-hidden="true"></div></div>
      <p id="q" class="question">点「开始通话」，我会像打电话一样逐题问你，你直接开口回答即可。</p>
      <div id="live" class="live"></div>
      <div id="status" class="status"></div>

      <div id="ctl" class="ctl">
        <button id="start" class="btn btn-call">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
          开始通话
        </button>
      </div>
    </section>

    <section id="history" class="history"></section>
  </main>

<script>
const $ = (id) => document.getElementById(id);
let questions = [], recognizer = null, hung = false, ttsAudio = null, micStream = null;

// 音色选择（男/女，默认女声）
let voicePref = (function(){ try { return localStorage.getItem('sbo_voice') || 'female'; } catch (e) { return 'female'; } })();
function voiceChoice(){ return voicePref; }
(function(){
  const sel = document.getElementById('vsel'); if (!sel) return;
  const sync = () => sel.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.v === voicePref));
  sync();
  sel.addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    voicePref = b.dataset.v; try { localStorage.setItem('sbo_voice', voicePref); } catch (_) {}
    sync();
  });
})();

const INITIAL_SILENCE_MS = 12000;  // 答题前可思考的等待
const END_SILENCE_MS = 2500;       // 说完停顿多久算「这题答完」自动进下一题

const ICON_STOP = '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2.5"></rect></svg>';
const ICON_RELOAD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>';

function setOrb(mode) { $("orb").className = "orb " + (mode || ""); }

// 对话历史：AI 问 / 你答 都记一条；返回 bubble 便于实时更新
function appendHistory(role, text) {
  const div = document.createElement("div");
  div.className = "turn " + role;
  const who = document.createElement("div");
  who.className = "who"; who.textContent = role === "ai" ? "第二大脑" : "你";
  const bubble = document.createElement("div");
  bubble.className = "bubble"; bubble.textContent = text;
  div.appendChild(who); div.appendChild(bubble);
  $("history").appendChild(div);
  div.scrollIntoView({ behavior: "smooth", block: "end" });
  return bubble;
}

function _sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }

function browserTTS(text) {
  return new Promise((resolve) => {
    try {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN"; u.rate = 1.02;
      u.onend = resolve; u.onerror = resolve;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    } catch (e) { resolve(); }
  });
}

// 朗读「尽力而为」：超时/失败都不卡流程（问题已显示在屏幕，用户读着答即可）。
// 先 MiniMax 音色（服务端 /tts）；抓取失败 or 浏览器拦截播放 → 回退浏览器 TTS。两者都带超时，绝不死等。
async function speak(text) {
  let played = false;
  try {
    const ctrl = new AbortController();
    const ft = setTimeout(() => ctrl.abort(), 8000);   // /tts 抓取最多 8s
    const r = await fetch("/tts", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, voice: voiceChoice() }), signal: ctrl.signal });
    clearTimeout(ft);
    if (r.ok) {
      const url = URL.createObjectURL(await r.blob());
      played = await new Promise((res) => {
        let done = false;
        const fin = (ok) => { if (!done) { done = true; res(ok); } };
        ttsAudio = new Audio(url);
        ttsAudio.onended = () => fin(true);
        ttsAudio.onerror = () => fin(false);
        ttsAudio.play().catch(() => fin(false));   // 自动播放被拦 → false → 回退
        setTimeout(() => fin(true), 15000);        // 播了但 onended 不触发 → 超时当播过
      });
      URL.revokeObjectURL(url);
    }
  } catch (e) { played = false; }
  if (!played) {
    await Promise.race([browserTTS(text), _sleep(12000)]);  // 兜底浏览器 TTS
  }
}

// 连续识别 + 静音自动结束：返回这一题的完整回答；同时实时更新历史气泡
function listen(userBubble) {
  return new Promise((resolve) => {
    let text = "", got = false, timer = null, stopped = false;
    const show = (t) => {
      $("live").textContent = t;
      if (userBubble) {
        userBubble.textContent = t || "…";
        const h = $("history"); h.scrollTop = h.scrollHeight;   // 气泡随识别变高 → 即时滚到底，别顶出下边界
      }
    };
    const arm = () => {
      clearTimeout(timer);
      timer = setTimeout(end, got ? END_SILENCE_MS : INITIAL_SILENCE_MS);
    };
    const end = () => {
      if (stopped) return; stopped = true;
      clearTimeout(timer);
      try { recognizer.stopContinuousRecognitionAsync(() => resolve(text.trim()), () => resolve(text.trim())); }
      catch (e) { resolve(text.trim()); }
    };
    recognizer.recognizing = (_s, e) => { show((text + e.result.text).trim()); arm(); };
    recognizer.recognized = (_s, e) => {
      if (e.result.text) { text += e.result.text; got = true; show(text.trim()); }
      arm();
    };
    recognizer.startContinuousRecognitionAsync(arm, arm);
  });
}

async function runCall() {
  try {
    for (let i = 0; i < questions.length && !hung; i++) {
      $("progress").textContent = `第 ${i + 1} / ${questions.length} 题`;
      $("q").textContent = questions[i];
      $("live").textContent = "";
      appendHistory("ai", questions[i]);   // AI 说话时同步把文字显示出来 + 记入历史
      setOrb("speaking"); $("status").textContent = "正在朗读问题…";
      await speak(questions[i]);
      if (hung) break;
      setOrb("listening"); $("status").textContent = "请开口回答（说完停顿一下，自动进入下一题）";
      const userBubble = appendHistory("user", "…");   // 占位，下面实时填入识别文字
      const answer = await listen(userBubble);
      if (hung) break;
      if (!answer) userBubble.textContent = "（未识别到回答）";
      await fetch("/answer", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ q: questions[i], a: answer }) });
    }
  } catch (e) {
    return finish("error");   // 异常结束（识别/网络等抛错）
  }
  finish(hung ? "hangup" : "completed");   // 用户主动结束 / 正常答完
}

// reason: completed（答完）/ hangup（用户点结束）/ error（异常）/ closed（关页面）
async function finish(reason) {
  reason = reason || "completed";
  try { if (recognizer) recognizer.stopContinuousRecognitionAsync(); } catch (e) {}
  try { speechSynthesis.cancel(); if (ttsAudio) ttsAudio.pause(); } catch (e) {}
  setOrb(""); document.body.classList.add("ended"); $("progress").textContent = ""; $("live").textContent = ""; $("status").textContent = "";
  $("ctl").style.display = "none";
  $("q").textContent = reason === "completed" ? "通话结束，谢谢！正在生成你的第二大脑…"
                     : reason === "hangup"    ? "你主动结束了，已答的部分会保存。"
                     : "通话异常结束。";
  try {
    await fetch("/done", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reason }) });
  } catch (e) {}
}

async function boot() {
  $("start").disabled = true; $("status").textContent = "连接中…";
  try {
    questions = await (await fetch("/questions")).json();
    const t = await (await fetch("/token")).json();
    if (t.error) throw new Error(t.error);

    // 先明确要麦克风权限（弹窗）；保留 stream 让麦克风一直可用
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (permErr) {
      setOrb(""); $("q").textContent = "需要麦克风权限";
      $("status").textContent = "";
      $("live").innerHTML = "浏览器/系统拦了麦克风：<br>① 点地址栏的麦克风或锁形图标 → 允许；"
        + "<br>② macOS：系统设置 → 隐私与安全性 → 麦克风 → 给浏览器打开；<br>然后点下面刷新。";
      $("ctl").innerHTML = '<button id="reload" class="btn btn-call">' + ICON_RELOAD + '刷新重试</button>';
      $("reload").onclick = () => location.reload();
      return;
    }

    const sdk = window.SpeechSDK;
    const cfg = sdk.SpeechConfig.fromAuthorizationToken(t.token, t.region);
    cfg.speechRecognitionLanguage = "zh-CN";
    cfg.setProperty(sdk.PropertyId.SpeechServiceConnection_InitialSilenceTimeoutMs, String(INITIAL_SILENCE_MS));
    recognizer = new sdk.SpeechRecognizer(cfg, sdk.AudioConfig.fromDefaultMicrophoneInput());
    recognizer.canceled = (_s, e) => {   // 识别出错时显示原因
      if (e.reason === sdk.CancellationReason.Error)
        $("status").textContent = "识别出错：" + (e.errorDetails || ("错误码 " + e.errorCode));
    };
    $("ctl").innerHTML = '<button id="hang" class="btn hangup">' + ICON_STOP + '结束通话</button>';
    $("hang").onclick = () => { hung = true;
      try { recognizer.stopContinuousRecognitionAsync(); } catch (e) {}
      try { speechSynthesis.cancel(); } catch (e) {}
      try { if (ttsAudio) { ttsAudio.pause(); if (ttsAudio.onended) ttsAudio.onended(); } } catch (e) {} };
    document.body.classList.add("calling");   // 切到「通话中」布局：面板钉住 + 历史局部滚
    runCall();
  } catch (e) {
    $("start").disabled = false;
    setOrb(""); $("q").textContent = "初始化失败：" + e.message;
    $("status").textContent = "请确认 secrets.env 的 Azure 语音密钥/区域正确、且已允许麦克风权限。";
    try { fetch("/done", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reason: "error" }) }); } catch (_) {}
  }
}

// 关页面/刷新 = 异常结束（用户没正常答完就走了）
window.addEventListener("beforeunload", () => {
  try { navigator.sendBeacon("/done",
    new Blob([JSON.stringify({ reason: "closed" })], { type: "application/json" })); } catch (e) {}
});

$("start").onclick = boot;
</script>
</body>
</html>
